{% extends "rest_framework/base.html" %}

{% block userlinks %}
  {% if user.is_authenticated %}
    <b>{{ user.username }}</b>
    <form action="/api/auth/logout/" method="post">{% csrf_token %}<button type="submit" style='color: darkred;'>Logout</button></form>
  {% else %}
    <p> </p>
    <p><a href='/accounts/google/login/'>Login with Google</a></p>
  {% endif %}
{% endblock %}
