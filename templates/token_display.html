<!DOCTYPE html>
<html>
<head><title>Your Token</title></head>
<body>
  <h2>Logged in as {{ user.email }}</h2>
  <p>Copy this access_token and use it in the DRF browsable API or Postman:</p>
  <textarea id='a_token' rows="4" cols="80">{{ access_token }}</textarea>
  <button onclick="copy_to_clipboard('a_token')">Copy Text</button>
  <br><br>
  <p>Add it as a header: <code>Authorization: Bearer &lt;token&gt;</code></p>
  <a href="/api/v1/">Go to Browsable API →</a>

  <script>

    function copy_to_clipboard( elm_id ) {

        var text = document.getElementById( elm_id ).innerHTML;

        navigator.clipboard.writeText( text );

      }

  </script>

</body>
</html>
